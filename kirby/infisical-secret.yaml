# Paso previo: crear el secret de autenticación manualmente:
#
#   kubectl create secret generic infisical-auth-credentials \
#     --namespace websites \
#     --from-literal=clientId=<TU_CLIENT_ID> \
#     --from-literal=clientSecret=<TU_CLIENT_SECRET>
#
# Luego aplicar este manifiesto para sincronizar los secrets desde Infisical.
---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: website-photo-infisical-secret
  namespace: websites
  labels:
    app: website-photo
spec:
  hostAPI: http://secrets.level5.local/api
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-auth-credentials
        secretNamespace: websites
      secretsScope:
        projectSlug: kirby-cms
        envSlug: dev
        secretsPath: /
  managedSecretReference:
    secretName: website-photo-secrets
    secretNamespace: websites
    secretType: Opaque
    creationPolicy: Orphan
